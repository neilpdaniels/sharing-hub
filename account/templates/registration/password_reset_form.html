{% extends "base.html" %}
{% load bootstrap4 %}

{% block title %}Reset your password{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-lg-2"></div>
        <div class="col-lg-8">
    <h1>Forgotten your password</h1>
    <p>Enter your email address to get a new password</p>
    <form action='.' method="post">
        <div class="form-group has-feedback">
            
            {% bootstrap_field form.email show_label=False addon_before='<span class="fas fa-envelope form-control-feedback text-muted"></span>' %}
        </div>
        <input class="btn btn-primary" type="submit" value="Send reset link over email">
        {% csrf_token %}
    </form>
        </div>
    </div>
</div>
{% endblock %}
